<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}1,000 Nights{% endblock %}</title>

  <meta name="description" content="One short story, one poem, and one essay — every night for 1,000 nights. All public domain.">

  <!-- Open Graph -->
  <meta property="og:site_name" content="1,000 Nights">
  <meta property="og:title" content="{% block og_title %}1,000 Nights{% endblock %}">
  <meta property="og:description" content="One short story, one poem, and one essay — every night for 1,000 nights. All public domain.">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ root }}static/style.css">
</head>
<body>
  <header class="site-header">
    <a href="{{ root }}index.html" class="site-title">1,000 Nights</a>
    <nav>
      <a href="{{ root }}about.html">About</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>One short story, one poem, one essay — every night for 1,000 nights.</p>
  </footer>

  <script src="{{ root }}static/streak.js"></script>
</body>
</html>
